<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>AutoVente - Voitures d'exception</title>
    
    <!-- Liaison CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="header">
    <h1>🏎️ AutoVente</h1>
    <p>Photos et offres exclusives – Voitures de prestige</p>
</header>

<div class="container">
    <!-- Grille des voitures : 3 rangées de 3 = 9 vignettes -->
    <h2 style="margin-bottom: 1.5rem;">✨ Nos annonces</h2>
    <div class="cars-grid" id="carsGrid">
        <!-- Les 9 voitures seront injectées ici dynamiquement via JS -->
    </div>
</div>

<footer>
    <p>📞 Contact : 06 12 34 56 78 | ✉️ contact@autovente.fr</p>
    <p style="font-size: 0.8rem; margin-top: 0.5rem;">AutoVente - Vente de véhicules d'exception</p>
</footer>

<!-- Modal pour agrandir les photos -->
<div id="imageModal" class="modal">
    <span class="modal-close">&times;</span>
    <img id="modalImage" src="" alt="Agrandissement">
</div>

<!-- Liaison JavaScript -->
<script src="script.js"></script>
</body>
</html>
